apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    app: api
    {{- include "collabboard.labels" . | nindent 4 }}
data:
  NODE_ENV: production
  PORT: "3050"
  CORS_ORIGIN: {{ .Values.api.config.corsOrigin }}
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USERNAME: collabboard_app
  DB_NAME: collabboard
  DB_SSL: "false"
  REDIS_URL: redis://redis:6379
  JWT_EXPIRY: {{ .Values.api.config.jwtExpiry }}
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_CALLBACK_URL: {{ .Values.api.config.googleCallbackUrl }}
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  labels:
    app: api
    {{- include "collabboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.api.jwtSecret }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
    {{- include "collabboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3050
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: APP_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3050
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3050
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
    {{- include "collabboard.labels" . | nindent 4 }}
spec:
  selector:
    app: api
  ports:
    - port: 3050
      targetPort: 3050
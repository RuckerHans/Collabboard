{{- if .Values.migrations.run }}
apiVersion: batch/v1
kind: Job
metadata:
  name: collabboard-migrate
  labels:
    app: migrate
    {{- include "collabboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ .Values.api.image }}
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/run-migrations.js"]
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_SSL
              value: "false"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: APP_PASSWORD
{{- end }}
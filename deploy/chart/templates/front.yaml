apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  labels:
    app: front
    {{- include "collabboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.front.replicas }}
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: {{ .Values.front.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: API_INTERNAL_URL
              value: http://api:3050
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: front
  labels:
    app: front
    {{- include "collabboard.labels" . | nindent 4 }}
spec:
  selector:
    app: front
  ports:
    - port: 3000
      targetPort: 3000
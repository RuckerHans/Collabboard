apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collabboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RuckerHans/Collabboard
    targetRevision: master
    path: deploy/chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
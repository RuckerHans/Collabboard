services:
  nginx:
    image: nginx:1.27-alpine
    container_name: collabboard-nginx
    restart: unless-stopped
    depends_on:
      - front
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:16-alpine
    container_name: collabboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabboard
      POSTGRES_USER: collabboard
      POSTGRES_PASSWORD: collabboard123
      APP_PASSWORD: collabboard_app_pw123
    ports:
      - "5432:5432"
    volumes:
      - collabboard_pg_data:/var/lib/postgresql/data
      - ./collabboard_api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabboard -d collabboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: collabboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./collabboard_api
      dockerfile: Dockerfile
    image: nest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3050
      CORS_ORIGIN: http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: collabboard_app
      DB_PASSWORD: collabboard_app_pw123
      DB_NAME: collabboard
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-collabboard-secret
      JWT_EXPIRY: 7d
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_CALLBACK_URL: http://localhost/api/auth/google/callback
    expose:
      - "3050"

  front:
    build:
      context: ./collabboard_front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SOCKET_URL: ""
    image: collabboard-front
    container_name: collabboard-front
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:3050
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SOCKET_URL: ""
    ports:
      - "3000:3000"

volumes:
  collabboard_pg_data:

name: Tests

on:
  workflow_call:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: collabboard
          POSTGRES_USER: collabboard
          POSTGRES_PASSWORD: collabboard123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_api/package-lock.json
      - name: Install dependencies
        working-directory: collabboard_api
        run: npm ci
      - name: Install postgresql-client (for psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply migrations
        working-directory: collabboard_api
        env:
          APP_PASSWORD: collabboard_app_pw123
        run: |
          for f in migrations/001_init_schema_and_seed.sql \
                   migrations/002_enable_rls.sql \
                   migrations/003_notify_board_member_changes.sql \
                   migrations/004_drop_presence_table.sql; do
            PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
              --set ON_ERROR_STOP=1 -f "$f"
          done
      - name: Lint
        working-directory: collabboard_api
        run: npm run lint
      - name: Run tests
        working-directory: collabboard_api
        run: npm test && npm run test:rls
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: collabboard
          DB_USERNAME: collabboard_app
          DB_PASSWORD: collabboard_app_pw123
      - name: Build
        working-directory: collabboard_api
        run: npm run build

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_front/package-lock.json
      - name: Install dependencies
        working-directory: collabboard_front
        run: npm ci
      - name: Run tests
        working-directory: collabboard_front
        run: npm run test
      - name: Build
        working-directory: collabboard_front
        run: npm run build
name: GitOps

# Builds images for the Kubernetes/ArgoCD deployment path.
# The ECS production pipeline lives in ci.yml and is unrelated.
on:
  push:
    branches: [master]
    paths:
      - 'collabboard_api/**'
      - 'collabboard_front/**'

permissions:
  contents: write    # to commit the tag bump
  packages: write    # to push to GHCR

# One bump at a time; a second push queues rather than racing the git push
concurrency:
  group: gitops-image-bump
  cancel-in-progress: false

jobs:
  build-push-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        run: |
          docker build -t ghcr.io/ruckerhans/collabboard-api:${{ github.sha }} ./collabboard_api
          docker push ghcr.io/ruckerhans/collabboard-api:${{ github.sha }}

      - name: Build and push front image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            --build-arg NEXT_PUBLIC_SOCKET_URL= \
            -t ghcr.io/ruckerhans/collabboard-front:${{ github.sha }} ./collabboard_front
          docker push ghcr.io/ruckerhans/collabboard-front:${{ github.sha }}

      - name: Bump image tags in values.yaml
        run: |
          yq -i '
            .api.image.tag = "${{ github.sha }}" |
            .front.image.tag = "${{ github.sha }}"
          ' deploy/chart/values.yaml

      - name: Commit and push the bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/chart/values.yaml
          git commit -m "chore: deploy ${GITHUB_SHA::7} to k8s [skip ci]"
          git pull --rebase origin master
          git push origin master
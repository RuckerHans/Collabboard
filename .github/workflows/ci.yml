name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: collabboard
          POSTGRES_USER: collabboard
          POSTGRES_PASSWORD: collabboard123
        ports:
          - 5432:5432
        # Waits for Postgres to actually be ready before later steps run —
        # without this, migrations/tests can race against a DB that's
        # still booting.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_api/package-lock.json

      - name: Install dependencies
        working-directory: collabboard_api
        run: npm ci

      - name: Install postgresql-client (for psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema migration
        working-directory: collabboard_api
        run: |
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            -f migrations/001_init_schema_and_seed.sql

      - name: Apply RLS and follow-up migrations
        working-directory: collabboard_api
        env:
          APP_PASSWORD: collabboard_app_pw123
        run: |
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            --set ON_ERROR_STOP=1 \
            -f migrations/002_enable_rls.sql
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            --set ON_ERROR_STOP=1 \
            -f migrations/003_notify_board_member_changes.sql
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            --set ON_ERROR_STOP=1 \
            -f migrations/004_drop_presence_table.sql

      - name: Lint
        working-directory: collabboard_api
        run: npm run lint

      - name: Run tests
        working-directory: collabboard_api
        run: npm test && npm run test:rls
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: collabboard
          DB_USERNAME: collabboard_app
          DB_PASSWORD: collabboard_app_pw123

      - name: Build
        working-directory: collabboard_api
        run: npm run build

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_front/package-lock.json

      - name: Install dependencies
        working-directory: collabboard_front
        run: npm ci

      - name: Run tests
        working-directory: collabboard_front
        run: npm run test

      - name: Build
        working-directory: collabboard_front
        run: npm run build

  # Production schema changes stay manual because solo-repository pushes to
  # master have no independent review gate. They must never ride an automatic
  # application deployment.
  deploy-migrations:
    name: Run production database migrations
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: backend-test

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECS_CLUSTER: collabboard-cluster
      TASK_DEFINITION: collabboard-api-task
      CONTAINER_NAME: collabboard-api-task
      LOG_GROUP: /ecs/collabboard-api
      DB_CREDENTIALS_SECRET_ARN: ${{ vars.DB_CREDENTIALS_SECRET_ARN }}
      PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
      API_SECURITY_GROUP_ID: ${{ vars.API_SECURITY_GROUP_ID }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Run and monitor migration task
        run: |
          set -euo pipefail

          for required_var in \
            DB_CREDENTIALS_SECRET_ARN \
            PRIVATE_SUBNET_IDS \
            API_SECURITY_GROUP_ID
          do
            if [ -z "${!required_var}" ]; then
              echo "::error::Repository variable $required_var is not configured."
              exit 1
            fi
          done

          NETWORK_CONFIGURATION="$(jq -cn \
            --arg subnet_ids "$PRIVATE_SUBNET_IDS" \
            --arg security_group_id "$API_SECURITY_GROUP_ID" \
            '{
              awsvpcConfiguration: {
                subnets: ($subnet_ids | split(",") | map(gsub("^\\s+|\\s+$"; ""))),
                securityGroups: [$security_group_id],
                assignPublicIp: "DISABLED"
              }
            }')"

          OVERRIDES="$(jq -cn \
            --arg container_name "$CONTAINER_NAME" \
            --arg secret_arn "$DB_CREDENTIALS_SECRET_ARN" \
            '{
              containerOverrides: [{
                name: $container_name,
                command: ["node", "scripts/run-migrations.js"],
                environment: [{
                  name: "DB_CREDENTIALS_SECRET_ARN",
                  value: $secret_arn
                }]
              }]
            }')"

          RUN_RESULT="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIGURATION" \
            --overrides "$OVERRIDES" \
            --output json)"

          if [ "$(jq '.failures | length' <<< "$RUN_RESULT")" -ne 0 ]; then
            echo "::error::ECS rejected the migration task."
            jq '.failures' <<< "$RUN_RESULT"
            exit 1
          fi

          TASK_ARN="$(jq -r '.tasks[0].taskArn // empty' <<< "$RUN_RESULT")"
          if [ -z "$TASK_ARN" ]; then
            echo "::error::ECS did not return a migration task ARN."
            exit 1
          fi

          echo "Started migration task: $TASK_ARN"

          WAIT_STATUS=0
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            || WAIT_STATUS=$?

          TASK_STATE="$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --output json)"

          jq '.tasks[0] | {
            taskArn,
            stopCode,
            stoppedReason,
            containers: [.containers[] | {
              name,
              lastStatus,
              exitCode,
              reason
            }]
          }' <<< "$TASK_STATE"

          EXIT_CODE="$(jq -r \
            --arg container_name "$CONTAINER_NAME" \
            '.tasks[0].containers[]
              | select(.name == $container_name)
              | .exitCode // empty' \
            <<< "$TASK_STATE")"

          if [ "$WAIT_STATUS" -ne 0 ] || [ "$EXIT_CODE" != "0" ]; then
            TASK_ID="${TASK_ARN##*/}"
            LOG_STREAM_PREFIX="ecs/${CONTAINER_NAME}/${TASK_ID}"

            echo "===== Migration task CloudWatch logs ====="
            aws logs tail "$LOG_GROUP" \
              --since 1h \
              --format short \
              --log-stream-name-prefix "$LOG_STREAM_PREFIX" \
              || echo "Unable to read migration task logs."

            echo "::error::Migration task failed with exit code ${EXIT_CODE:-unknown}."
            exit 1
          fi

          echo "Production migrations completed successfully."

  deploy-api:
    name: Deploy collabboard_api to ECS
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECR_REPOSITORY: collabboard-api
      ECS_CLUSTER: collabboard-cluster
      ECS_SERVICE: collabboard-api-service
      CONTAINER_NAME: collabboard-api-task

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: collabboard_api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition collabboard-api-task \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Validate rendered API task definition
        env:
          TASK_DEFINITION_FILE: ${{ steps.render-task-def.outputs.task-definition }}
          EXPECTED_IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          set -euo pipefail
          jq -e --arg name "$CONTAINER_NAME" --arg image "$EXPECTED_IMAGE" '
            .containerDefinitions[]
            | select(.name == $name and .image == $image)
          ' "$TASK_DEFINITION_FILE" > /dev/null

      - name: Deploy to ECS
        id: deploy-api
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Diagnose failed API deployment
        if: failure() && steps.deploy-api.outcome == 'failure'
        env:
          TASK_DEFINITION_FILE: ${{ steps.render-task-def.outputs.task-definition }}
        run: |
          set +e

          echo "===== ECS service deployment state and recent events ====="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].{
              status:status,
              desiredCount:desiredCount,
              runningCount:runningCount,
              pendingCount:pendingCount,
              deployments:deployments[*].{
                id:id,
                status:status,
                rolloutState:rolloutState,
                rolloutStateReason:rolloutStateReason,
                taskDefinition:taskDefinition,
                desiredCount:desiredCount,
                runningCount:runningCount,
                failedTasks:failedTasks
              },
              events:events[0:10].{createdAt:createdAt,message:message}
            }' \
            --output json

          echo "===== Recently stopped API tasks ====="
          STOPPED_TASKS="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].events[*].message' \
            --output text \
            | grep -oE 'task [0-9a-f]{32}' \
            | awk '{print $2}' \
            | sort -u)"

          if [ -n "$STOPPED_TASKS" ]; then
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks $STOPPED_TASKS \
              --query 'tasks[*].{
                taskArn:taskArn,
                taskDefinitionArn:taskDefinitionArn,
                stoppedAt:stoppedAt,
                stopCode:stopCode,
                stoppedReason:stoppedReason,
                containers:containers[*].{
                  name:name,
                  lastStatus:lastStatus,
                  exitCode:exitCode,
                  reason:reason,
                  healthStatus:healthStatus
                }
              }' \
              --output json \
              || echo "Unable to describe failed tasks. Grant ecs:DescribeTasks to the GitHub deployment role."
          else
            echo "No failed task IDs were found in the recent ECS service events."
          fi

          echo "===== Recent API CloudWatch logs ====="
          LOG_GROUP="$(jq -r --arg name "$CONTAINER_NAME" '
            .containerDefinitions[]
            | select(.name == $name)
            | .logConfiguration.options["awslogs-group"] // empty
          ' "$TASK_DEFINITION_FILE")"

          if [ -n "$LOG_GROUP" ]; then
            aws logs tail "$LOG_GROUP" --since 30m --format short \
              || echo "Unable to read API logs. Grant logs:FilterLogEvents to the GitHub deployment role."
          else
            echo "No awslogs log group is configured for container $CONTAINER_NAME."
          fi

          exit 0
  deploy-front:
    name: Deploy collabboard_front to ECS
    runs-on: ubuntu-latest
    needs: frontend-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECR_REPOSITORY: collabboard-front
      ECS_CLUSTER: collabboard-cluster
      ECS_SERVICE: collabboard-front-service
      CONTAINER_NAME: collabboard-front

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: collabboard_front
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            --build-arg NEXT_PUBLIC_SOCKET_URL= \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition collabboard-front-task \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

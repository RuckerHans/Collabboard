name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: collabboard
          POSTGRES_USER: collabboard
          POSTGRES_PASSWORD: collabboard123
        ports:
          - 5432:5432
        # Waits for Postgres to actually be ready before later steps run —
        # without this, migrations/tests can race against a DB that's
        # still booting.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_api/package-lock.json

      - name: Install dependencies
        working-directory: collabboard_api
        run: npm ci

      - name: Install postgresql-client (for psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema migration
        working-directory: collabboard_api
        run: |
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            -f migrations/001_init_schema_and_seed.sql

      - name: Create app role and apply RLS migration
        working-directory: collabboard_api
        run: |
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard -c "
            CREATE ROLE collabboard_app WITH LOGIN PASSWORD 'collabboard_app_pw123' NOSUPERUSER;
            GRANT USAGE ON SCHEMA public TO collabboard_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO collabboard_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO collabboard_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO collabboard_app;
          "
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            -f migrations/002_enable_rls.sql

      - name: Lint
        working-directory: collabboard_api
        run: npm run lint

      - name: Run tests
        working-directory: collabboard_api
        run: npm test && npm run test:rls
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: collabboard
          DB_USERNAME: collabboard_app
          DB_PASSWORD: collabboard_app_pw123

      - name: Build
        working-directory: collabboard_api
        run: npm run build

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_front/package-lock.json

      - name: Install dependencies
        working-directory: collabboard_front
        run: npm ci

      - name: Run tests
        working-directory: collabboard_front
        run: npm run test

      - name: Build
        working-directory: collabboard_front
        run: npm run build

  deploy-api:
    name: Deploy collabboard_api to ECS
    runs-on: ubuntu-latest
    needs: backend-test
    # AWS deployment temporarily paused while new features are in development.
    # To re-enable, restore:
    # if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    if: ${{ false }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECR_REPOSITORY: collabboard-api
      ECS_CLUSTER: collabboard-cluster
      ECS_SERVICE: collabboard-api-service
      CONTAINER_NAME: collabboard-api-task

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: collabboard_api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition collabboard-api-task \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Validate rendered API task definition
        env:
          TASK_DEFINITION_FILE: ${{ steps.render-task-def.outputs.task-definition }}
          EXPECTED_IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          set -euo pipefail
          jq -e --arg name "$CONTAINER_NAME" --arg image "$EXPECTED_IMAGE" '
            .containerDefinitions[]
            | select(.name == $name and .image == $image)
          ' "$TASK_DEFINITION_FILE" > /dev/null

      - name: Deploy to ECS
        id: deploy-api
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Diagnose failed API deployment
        if: failure() && steps.deploy-api.outcome == 'failure'
        env:
          TASK_DEFINITION_FILE: ${{ steps.render-task-def.outputs.task-definition }}
        run: |
          set +e

          echo "===== ECS service deployment state and recent events ====="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].{
              status:status,
              desiredCount:desiredCount,
              runningCount:runningCount,
              pendingCount:pendingCount,
              deployments:deployments[*].{
                id:id,
                status:status,
                rolloutState:rolloutState,
                rolloutStateReason:rolloutStateReason,
                taskDefinition:taskDefinition,
                desiredCount:desiredCount,
                runningCount:runningCount,
                failedTasks:failedTasks
              },
              events:events[0:10].{createdAt:createdAt,message:message}
            }' \
            --output json

          echo "===== Recently stopped API tasks ====="
          STOPPED_TASKS="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].events[*].message' \
            --output text \
            | grep -oE 'task [0-9a-f]{32}' \
            | awk '{print $2}' \
            | sort -u)"

          if [ -n "$STOPPED_TASKS" ]; then
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks $STOPPED_TASKS \
              --query 'tasks[*].{
                taskArn:taskArn,
                taskDefinitionArn:taskDefinitionArn,
                stoppedAt:stoppedAt,
                stopCode:stopCode,
                stoppedReason:stoppedReason,
                containers:containers[*].{
                  name:name,
                  lastStatus:lastStatus,
                  exitCode:exitCode,
                  reason:reason,
                  healthStatus:healthStatus
                }
              }' \
              --output json \
              || echo "Unable to describe failed tasks. Grant ecs:DescribeTasks to the GitHub deployment role."
          else
            echo "No failed task IDs were found in the recent ECS service events."
          fi

          echo "===== Recent API CloudWatch logs ====="
          LOG_GROUP="$(jq -r --arg name "$CONTAINER_NAME" '
            .containerDefinitions[]
            | select(.name == $name)
            | .logConfiguration.options["awslogs-group"] // empty
          ' "$TASK_DEFINITION_FILE")"

          if [ -n "$LOG_GROUP" ]; then
            aws logs tail "$LOG_GROUP" --since 30m --format short \
              || echo "Unable to read API logs. Grant logs:FilterLogEvents to the GitHub deployment role."
          else
            echo "No awslogs log group is configured for container $CONTAINER_NAME."
          fi

          exit 0
  deploy-front:
    name: Deploy collabboard_front to ECS
    runs-on: ubuntu-latest
    needs: frontend-test
    # AWS deployment temporarily paused while new features are in development.
    # To re-enable, restore:
    # if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    if: ${{ false }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECR_REPOSITORY: collabboard-front
      ECS_CLUSTER: collabboard-cluster
      ECS_SERVICE: collabboard-front-service
      CONTAINER_NAME: collabboard-front

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: collabboard_front
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            --build-arg NEXT_PUBLIC_SOCKET_URL= \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition collabboard-front-task \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

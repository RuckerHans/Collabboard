name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: collabboard
          POSTGRES_USER: collabboard
          POSTGRES_PASSWORD: collabboard123
        ports:
          - 5432:5432
        # Waits for Postgres to actually be ready before later steps run —
        # without this, migrations/tests can race against a DB that's
        # still booting.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_api/package-lock.json

      - name: Install dependencies
        working-directory: collabboard_api
        run: npm ci

      - name: Install postgresql-client (for psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema migration
        working-directory: collabboard_api
        run: |
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            -f migrations/001_init_schema_and_seed.sql

      - name: Create app role and apply RLS migration
        working-directory: collabboard_api
        run: |
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard -c "
            CREATE ROLE collabboard_app WITH LOGIN PASSWORD 'collabboard_app_pw123' NOSUPERUSER;
            GRANT USAGE ON SCHEMA public TO collabboard_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO collabboard_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO collabboard_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO collabboard_app;
          "
          PGPASSWORD=collabboard123 psql -h localhost -U collabboard -d collabboard \
            -f migrations/002_enable_rls.sql

      - name: Lint
        working-directory: collabboard_api
        # Non-blocking for now: this codebase has ~80 pre-existing
        # @typescript-eslint/no-unsafe-* violations in files predating
        # this CI pipeline (auth.module.ts, presence.gateway.ts,
        # pg-notify.service.ts, etc.). Surfacing them here without
        # failing the build avoids blocking every PR on unrelated debt.
        # Tracked as a follow-up to fix incrementally; remove
        # continue-on-error once those are cleaned up.
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        working-directory: collabboard_api
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: collabboard
          DB_USERNAME: collabboard
          DB_PASSWORD: collabboard123

      - name: Build
        working-directory: collabboard_api
        run: npm run build

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: collabboard_front/package-lock.json

      - name: Install dependencies
        working-directory: collabboard_front
        run: npm ci

      - name: Run tests
        working-directory: collabboard_front
        run: npm run test

      - name: Build
        working-directory: collabboard_front
        run: npm run build

  deploy-api:
    name: Deploy collabboard_api to ECS
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECR_REPOSITORY: collabboard-api
      ECS_CLUSTER: collabboard-cluster
      ECS_SERVICE: collabboard-api-service
      CONTAINER_NAME: collabboard-api-task

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: collabboard_api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition collabboard-api-task \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
  deploy-front:
    name: Deploy collabboard_front to ECS
    runs-on: ubuntu-latest
    needs: frontend-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-2
      ECR_REPOSITORY: collabboard-front
      ECS_CLUSTER: collabboard-cluster
      ECS_SERVICE: collabboard-front-service
      CONTAINER_NAME: collabboard-front

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::433048100589:role/collabboard-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: collabboard_front
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            --build-arg NEXT_PUBLIC_SOCKET_URL= \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition collabboard-front-task \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true